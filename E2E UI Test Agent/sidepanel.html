<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>E2E Test Agent</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* button, input 등은 font-family를 상속 안 함 → 명시적으로 상속 */
button, input, select, textarea {
  font-family: inherit;
  font-size: inherit;
}

:root {
  --bg:       #0d0f14;
  --surface:  #13161e;
  --surface2: #1a1e28;
  --surface3: #222736;
  --border:   #252a38;
  --border2:  #2e3448;
  --text:     #dde3f0;
  --text2:    #8891a8;
  --text3:    #4e566a;
  --accent:   #6366f1;
  --accent2:  #818cf8;
  --accentbg: rgba(99,102,241,0.08);
  --accentbd: rgba(99,102,241,0.25);
  --green:    #22c55e;
  --greenbg:  rgba(34,197,94,0.08);
  --greenbd:  rgba(34,197,94,0.25);
  --red:      #f43f5e;
  --redbg:    rgba(244,63,94,0.08);
  --redbd:    rgba(244,63,94,0.25);
  --yellow:   #fbbf24;
  --blue:     #38bdf8;
  --bluebg:   rgba(56,189,248,0.08);
  --bluebd:   rgba(56,189,248,0.2);
  --mono: ui-monospace, 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

html, body { height: 100%; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 13px;
  line-height: 1.5;
}

/* ── 스크롤바 ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ══════════════════════════════════════
   헤더
══════════════════════════════════════ */
.header {
  display: flex;
  align-items: center;
  padding: 0 12px;
  height: 44px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 8px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent2);
  letter-spacing: -0.02em;
}
.logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }

.header-site {
  flex: 1;
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}

.header-status {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--text3);
  font-family: var(--mono);
  flex-shrink: 0;
}
.status-indicator {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border2);
  transition: background 0.3s;
}
.status-indicator.running { background: var(--accent); animation: glow 1.2s ease-in-out infinite; }
.status-indicator.pass    { background: var(--green); }
.status-indicator.fail    { background: var(--red); }
@keyframes glow {
  0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.4); }
  50%     { box-shadow: 0 0 0 4px rgba(99,102,241,0); }
}

.btn-settings {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: 1px solid var(--border2);
  border-radius: 6px; cursor: pointer; color: var(--text3);
  font-size: 13px; transition: all 0.15s; flex-shrink: 0;
}
.btn-settings:hover { border-color: var(--accent2); color: var(--accent2); background: var(--accentbg); }
.btn-settings.active { border-color: var(--accent2); color: var(--accent2); background: var(--accentbg); }

/* ══════════════════════════════════════
   설정 오버레이
══════════════════════════════════════ */
.settings-overlay {
  position: absolute;
  top: 44px; left: 0; right: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  transform: translateY(-8px);
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s ease;
}
.settings-overlay.open {
  transform: translateY(0);
  opacity: 1;
  pointer-events: all;
}
.settings-inner { padding: 14px; }
.settings-title {
  font-size: 10px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 10px; font-family: var(--mono);
}
.provider-tabs {
  display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px;
}
.provider-tab {
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text2);
  font-size: 11px;
  font-family: var(--mono);
  cursor: pointer;
  transition: all 0.15s;
}
.provider-tab:hover { color: var(--text); border-color: var(--border2); }
.provider-tab.active {
  background: var(--accentbg);
  border-color: var(--accentbd);
  color: var(--accent2);
  font-weight: 500;
}
.fields { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; }
.field-row { display: flex; align-items: center; gap: 8px; }
.agent-options {
  margin: 8px 10px 10px;
  padding: 0;
}
.agent-option {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text2);
  font-family: var(--mono);
}
.agent-option input[type="checkbox"] {
  width: 13px;
  height: 13px;
  accent-color: var(--accent);
}
.field-label {
  font-size: 10px; color: var(--text3);
  width: 76px; flex-shrink: 0;
  text-align: right; font-family: var(--mono);
}
.field-input, .field-select {
  flex: 1; min-width: 0;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  font-size: 11px;
  padding: 5px 8px;
  outline: none;
  font-family: var(--mono);
  transition: border-color 0.15s;
}
.field-input:focus, .field-select:focus { border-color: var(--accent2); }
.field-select option { background: var(--surface2); }
.settings-footer {
  display: flex; align-items: center; justify-content: flex-end; gap: 8px;
}
.save-status { font-size: 10px; font-family: var(--mono); margin-right: auto; }
.save-status.ok  { color: var(--green); }
.save-status.err { color: var(--red); }
.btn-save {
  padding: 5px 14px;
  background: var(--accent);
  border: none; border-radius: 4px;
  color: #fff; font-size: 11px; font-weight: 600;
  font-family: var(--mono);
  cursor: pointer; transition: opacity 0.15s;
}
.btn-save:hover { opacity: 0.85; }

/* ── GitHub Copilot 로그인 UI ─────────────────────── */
.gh-auth-status { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.gh-status-msg  { font-size: 10px; font-family: var(--mono); }
.gh-status-info  { color: var(--blue); }
.gh-status-error { color: var(--red); }
.gh-logged-in-badge { font-size: 11px; color: var(--green); font-family: var(--mono); }
.btn-gh-login {
  padding: 5px 12px; background: #238636;
  border: 1px solid #2ea043; border-radius: 4px;
  color: #fff; font-size: 11px; font-weight: 600; font-family: var(--mono);
  cursor: pointer; transition: opacity 0.15s; width: fit-content;
}
.btn-gh-login:hover { opacity: 0.85; }
.btn-gh-logout {
  padding: 3px 10px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 4px;
  color: var(--text3); font-size: 10px; font-family: var(--mono);
  cursor: pointer; width: fit-content;
}
.btn-gh-logout:hover { color: var(--red); border-color: var(--red); }
.gh-device-code-wrap { display: flex; flex-direction: column; gap: 6px; }
.gh-device-code-label { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.gh-device-code-row { display: flex; align-items: center; gap: 6px; }
.gh-device-code-value {
  font-size: 16px; font-weight: 700; letter-spacing: 3px;
  color: var(--accent); font-family: var(--mono);
}
.btn-gh-copy {
  padding: 2px 8px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 3px;
  color: var(--text3); font-size: 10px; font-family: var(--mono); cursor: pointer;
}
.btn-gh-copy:hover { border-color: var(--accent); color: var(--accent); }
.btn-gh-open {
  padding: 4px 10px; background: #1f6feb;
  border: 1px solid #388bfd; border-radius: 4px;
  color: #fff; font-size: 11px; font-family: var(--mono);
  cursor: pointer; width: fit-content;
}
.btn-gh-open:hover { opacity: 0.85; }
.gh-spinner { font-size: 10px; color: var(--blue); font-family: var(--mono); animation: blink 1.2s infinite; }
.btn-gh-cancel {
  padding: 3px 8px; background: transparent;
  border: 1px solid var(--border); border-radius: 3px;
  color: var(--text3); font-size: 10px; font-family: var(--mono);
  cursor: pointer; width: fit-content;
}
.btn-gh-cancel:hover { border-color: var(--red); color: var(--red); }

/* ══════════════════════════════════════
   탭 네비게이션
══════════════════════════════════════ */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab-btn {
  flex: 1;
  padding: 9px;
  background: none; border: none;
  color: var(--text3);
  font-size: 11px; font-weight: 500;
  font-family: var(--mono);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.tab-btn:hover { color: var(--text2); }
.tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }
.tab-count {
  font-size: 9px;
  background: var(--surface3);
  padding: 1px 5px; border-radius: 8px;
  color: var(--text3);
  font-family: var(--mono);
}
.tab-btn.active .tab-count { background: var(--accentbg); color: var(--accent2); }

/* ══════════════════════════════════════
   메인 split 컨테이너
══════════════════════════════════════ */
#mainSplit {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ══════════════════════════════════════
   탭 콘텐츠
══════════════════════════════════════ */
.tab-content { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
.tab-pane { display: none; flex: 1; flex-direction: column; min-height: 0; }
.tab-pane.active { display: flex; }

/* ── splitter 핸들 ── */
.split-handle {
  height: 6px;
  background: var(--surface);
  border-top: 1px solid var(--border2);
  border-bottom: 1px solid var(--border2);
  cursor: row-resize;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  user-select: none;
}
.split-handle:hover,
.split-handle.dragging { background: var(--accentbg); border-color: var(--accentbd); }
.split-handle-grip {
  width: 24px; height: 2px;
  border-radius: 1px;
  background: var(--border2);
  pointer-events: none;
}
.split-handle:hover .split-handle-grip,
.split-handle.dragging .split-handle-grip { background: var(--accent2); }

/* 로그 탭 활성 시 splitter 숨김 */
#mainSplit.log-active .split-handle { display: none; }

/* ── 시나리오 탭 ── */
.load-bar {
  padding: 10px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 7px; align-items: center;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.load-subrow {
  flex-basis: 100%;
  margin-top: 3px;
}
.path-input {
  flex: 1; min-width: 0;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text2);
  font-size: 11px; padding: 5px 8px;
  outline: none;
  font-family: var(--mono);
  transition: border-color 0.15s;
  cursor: default;
}
.path-input:focus { border-color: var(--accentbd); }
.btn-load {
  padding: 5px 11px;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  font-size: 11px; font-weight: 500;
  font-family: var(--mono);
  cursor: pointer; white-space: nowrap;
  transition: all 0.15s; flex-shrink: 0;
}
.btn-load:hover { border-color: var(--accentbd); color: var(--accent2); }
.btn-refresh {
  padding: 5px 8px;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  font-size: 13px;
  cursor: pointer; flex-shrink: 0;
  transition: all 0.15s;
}
.btn-refresh-keep:hover  { border-color: var(--greenbd); color: var(--green); }
.btn-refresh-reset:hover { border-color: rgba(251,191,36,0.3); color: var(--yellow); }
.load-msg {
  padding: 4px 12px;
  font-size: 10px; font-family: var(--mono);
  min-height: 22px; flex-shrink: 0;
  display: flex; align-items: center;
}
.load-msg.ok  { color: var(--green); }
.load-msg.err { color: var(--red); }

/* 시나리오 목록 */
.scenario-list {
  flex: 1; overflow-y: auto;
}
.scenario-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%;
  color: var(--text3); font-size: 12px; gap: 8px;
  text-align: center; line-height: 1.7;
  font-family: var(--mono);
}
.scenario-empty-icon { font-size: 24px; opacity: 0.3; }

.scenario-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.scenario-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--accent2);
  opacity: 0;
  transition: opacity 0.15s;
}
.scenario-item:hover { background: var(--surface); }
.scenario-item:hover::before { opacity: 0.4; }
.scenario-item.selected { background: var(--surface2); }
.scenario-item.selected::before { opacity: 1; }

.sc-id {
  font-size: 9px; font-weight: 600;
  font-family: var(--mono);
  color: var(--accent2);
  background: var(--accentbg);
  border: 1px solid var(--accentbd);
  padding: 2px 6px; border-radius: 3px;
  white-space: nowrap; flex-shrink: 0;
  margin-top: 1px;
}
.sc-info { flex: 1; min-width: 0; }
.sc-title {
  font-size: 12px; font-weight: 500;
  font-family: var(--sans);
  color: var(--text); margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sc-desc {
  font-size: 10px; color: var(--text3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-family: var(--mono);
}
.sc-run {
  font-size: 10px; padding: 3px 9px;
  background: var(--accent); border: none; border-radius: 3px;
  color: #fff; font-weight: 600; font-family: var(--mono);
  cursor: pointer; flex-shrink: 0;
  opacity: 0; transition: opacity 0.15s;
}
.scenario-item:hover .sc-run,
.scenario-item.selected .sc-run { opacity: 1; }

/* 실행 중에는 sc-run 버튼 hover 표시 억제 */
body.agent-running .scenario-item:hover .sc-run { opacity: 0; }
body.agent-running .scenario-item.selected .sc-run { opacity: 0; }

/* 실행 중 시나리오 항목 커서 변경 */
body.agent-running .scenario-item { cursor: default; }

/* ── 로그 탭 ── */
.log-pane {
  flex: 1; overflow-y: auto;
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 5px;
}
.log-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%;
  color: var(--text3); font-size: 11px; gap: 8px;
  text-align: center; font-family: var(--mono); line-height: 1.7;
}
.log-empty-icon { font-size: 22px; opacity: 0.25; }

/* 로그 아이템 */
.log-info {
  padding: 5px 9px; font-size: 11px; font-family: var(--mono);
  color: var(--blue);
  background: var(--bluebg); border: 1px solid var(--bluebd);
  border-radius: 4px;
  animation: fadeUp 0.18s ease;
}
.log-warn {
  padding: 5px 9px; font-size: 11px; font-family: var(--mono);
  color: var(--yellow);
  background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.2);
  border-radius: 4px;
}
.log-error {
  padding: 5px 9px; font-size: 11px; font-family: var(--mono);
  color: var(--red);
  background: var(--redbg); border: 1px solid var(--redbd);
  border-radius: 4px;
  animation: fadeUp 0.18s ease;
}

.log-tokens {
  padding: 2px 9px; font-size: 10px; font-family: var(--mono);
  color: #5a6480; text-align: right;
}

.log-step {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 6px; overflow: hidden;
  animation: fadeUp 0.18s ease;
}
.log-step-head {
  padding: 7px 10px;
  display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.log-step-head:hover { background: var(--surface2); }
.badge-step {
  font-size: 9px; font-weight: 600; font-family: var(--mono);
  color: var(--accent2);
  background: var(--accentbg);
  padding: 1px 6px; border-radius: 3px;
  white-space: nowrap;
}
.badge-action {
  font-size: 10px; font-family: var(--mono);
  color: var(--yellow);
  max-width: 160px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1;
}
.badge-model {
  font-size: 9px; font-family: var(--mono);
  color: var(--text3);
  margin-left: auto; flex-shrink: 0;
}

.badge-toggle {
  font-size: 10px; color: var(--text3);
  margin-left: auto; flex-shrink: 0;
  transition: transform 0.15s;
  line-height: 1;
}
.log-step.collapsed .badge-toggle { transform: rotate(-90deg); }
.log-step.collapsed .log-step-body { display: none; }

.log-step-body {
  padding: 6px 10px;
  font-size: 11px; color: var(--text2); line-height: 1.6;
}
.log-step-thinking { color: var(--text2); }
.log-step-reason {
  margin-top: 5px;
  padding-top: 5px;
  border-top: 1px solid var(--border);
  color: var(--yellow);
  font-size: 10px; font-family: var(--mono);
}

.log-thinking {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 6px;
}
.dots span {
  display: inline-block; width: 3px; height: 3px;
  border-radius: 50%; background: var(--accent);
  animation: blink 1.2s infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,100%{opacity:0.15} 50%{opacity:1} }
.thinking-txt { font-size: 10px; color: var(--text3); font-family: var(--mono); }

.result-card {
  border-radius: 6px; padding: 12px 14px;
  animation: fadeUp 0.25s ease;
}
.result-card.pass { background: var(--greenbg); border: 1px solid var(--greenbd); }
.result-card.fail { background: var(--redbg);   border: 1px solid var(--redbd); }
.result-icon { font-size: 18px; margin-bottom: 5px; }
.result-title { font-size: 14px; font-weight: 600; font-family: var(--mono); margin-bottom: 4px; }
.result-title.pass { color: var(--green); }
.result-title.fail { color: var(--red); }
.result-reason { font-size: 11px; line-height: 1.6; }
.result-reason.pass { color: var(--green); opacity: 0.8; }
.result-reason.fail { color: var(--red);   opacity: 0.8; }
.result-meta { margin-top: 7px; font-size: 10px; color: var(--text3); font-family: var(--mono); }

@keyframes fadeUp { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }

/* ══════════════════════════════════════
   하단 실행 도크 (항상 표시)
══════════════════════════════════════ */
.run-dock {
  background: var(--surface);
  border-top: none;
  padding: 10px 12px;
  flex-shrink: 0;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.run-selected {
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 8px; min-height: 20px;
}
.run-selected-badge {
  font-size: 9px; font-weight: 600; font-family: var(--mono);
  color: var(--accent2); background: var(--accentbg);
  border: 1px solid var(--accentbd);
  padding: 2px 7px; border-radius: 3px;
  white-space: nowrap; flex-shrink: 0;
}
.run-selected-title {
  font-size: 11px; color: var(--text2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1; min-width: 0;
}
.run-selected-empty {
  font-size: 11px; color: var(--text3); font-family: var(--mono);
}

/* 시나리오 직접 입력 textarea */
.run-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  font-size: 11px; padding: 7px 9px;
  outline: none; resize: none; line-height: 1.5;
  font-family: var(--sans);
  margin-bottom: 8px;
  transition: border-color 0.15s;
  min-height: 48px;
  flex: 1;
}
.run-textarea:focus { border-color: rgba(129,140,248,0.4); }

.run-btn {
  width: 100%; padding: 9px;
  background: var(--accent);
  border: none; border-radius: 5px;
  color: #fff; font-size: 12px; font-weight: 700;
  font-family: var(--mono);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: all 0.15s;
  letter-spacing: 0.02em;
}
.run-btn:hover:not(:disabled) { background: var(--accent2); }
.run-btn:disabled {
  background: var(--surface3);
  color: var(--text3);
  cursor: not-allowed;
}
.stop-btn {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  background: var(--redbg);
  border: 1px solid var(--redbd);
  border-radius: 5px;
  color: var(--red);
  font-size: 11px;
  font-weight: 700;
  font-family: var(--mono);
  cursor: pointer;
  transition: all 0.15s;
}
.stop-btn:hover {
  background: rgba(244,63,94,0.16);
}
.spinner {
  width: 12px; height: 12px;
  border: 2px solid rgba(255,255,255,0.25);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 로그 헤더 (로그 탭 내부) */
.log-tab-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
}
.log-tab-label {
  font-size: 10px; font-weight: 600; font-family: var(--mono);
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em;
}
.btn-clear {
  font-size: 10px; color: var(--text3);
  background: none; border: none; cursor: pointer;
  padding: 2px 6px; border-radius: 3px;
  font-family: var(--mono); transition: all 0.15s;
}
.btn-clear:hover { background: var(--surface2); color: var(--text); }

/* ── 시나리오 실행 결과 표시 ── */
.scenario-item.sc-done-pass .sc-title { color: var(--text2); }
.scenario-item.sc-done-fail .sc-title { color: var(--text3); }

.sc-result-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 9px; font-weight: 700;
  font-family: var(--mono);
  width: 14px; height: 14px;
  border-radius: 50%;
  margin-left: 5px;
  vertical-align: middle;
  flex-shrink: 0;
}
.sc-result-pass {
  background: var(--greenbg);
  border: 1px solid var(--greenbd);
  color: var(--green);
}
.sc-result-fail {
  background: var(--redbg);
  border: 1px solid var(--redbd);
  color: var(--red);
}
</style>
</head>
<body>

<!-- 숨겨진 파일 input -->
<input type="file" id="jsonFileInput" accept=".json" style="display:none" />

<!-- ── 헤더 ── -->
<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    E2E UI Test Agent
  </div>
  <span class="header-site" id="tabInfo"></span>
  <div class="header-status">
    <div class="status-indicator" id="statusDot"></div>
    <span id="statusText"></span>
  </div>
  <button class="btn-settings" id="settingsBtn" title="">⚙</button>
</div>

<!-- ── 설정 오버레이 ── -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-inner">
    <div class="settings-title" data-i18n="settingsLabel">AI Model</div>
    <div class="provider-tabs" id="providerTabs"></div>
    <div class="fields" id="providerFields"></div>
    <div class="settings-footer">
      <span class="save-status" id="saveStatus"></span>
      <button id="saveBtn" class="btn-save" data-i18n="btnSave">Save</button>
    </div>
  </div>
</div>

<!-- ── 탭 ── -->
<div class="tabs">
  <button class="tab-btn active" id="tabScenario" data-tab="scenario">
    <span data-i18n="tabScenario">Scenarios</span> <span class="tab-count" id="scenarioCount">0</span>
  </button>
  <button class="tab-btn" id="tabLog" data-tab="log">
    <span data-i18n="tabLog">Run Log</span> <span class="tab-count" id="logCount">0</span>
  </button>
</div>

<!-- ── splitter 포함 메인 영역 ── -->
<div id="mainSplit">

  <!-- 탭 콘텐츠 -->
  <div class="tab-content" id="tabContent">

    <!-- 시나리오 탭 -->
    <div class="tab-pane active" id="paneScenario">
      <div class="load-bar">
        <input type="text" class="path-input" id="jsonPathInput"
          data-i18n-placeholder="pathPlaceholder" placeholder="Select a file to show the path" readonly />
        <button class="btn-load" id="loadBtn" data-i18n="btnLoad">Load</button>
        <button class="btn-refresh btn-refresh-keep" id="refreshKeepBtn" hidden
          data-i18n-title="refreshKeepTitle">↻</button>
        <button class="btn-refresh btn-refresh-reset" id="refreshResetBtn" hidden
          data-i18n-title="refreshResetTitle">↺</button>
        <div class="load-subrow">
          <label class="agent-option" for="iframeOnlyCheckbox">
            <input type="checkbox" id="iframeOnlyCheckbox" />
            <span data-i18n="iframeOnlyMode">iframe DOM만 대상으로 실행</span>
          </label>
        </div>
      </div>
      <div class="load-msg" id="loadStatus"></div>
      <div class="scenario-list" id="scenarioList">
        <div class="scenario-empty">
          <div class="scenario-empty-icon">📂</div>
          <div><span data-i18n="scenarioEmptyTitle">Select a JSON file via Load</span><br>
          <span data-i18n="scenarioEmptyDesc">Scenario list will appear here</span></div>
        </div>
      </div>
    </div>

    <!-- 로그 탭 -->
    <div class="tab-pane" id="paneLog">
      <div class="log-tab-header">
        <span class="log-tab-label" data-i18n="logLabel">Run Log</span>
        <button class="btn-clear" id="clearBtn" data-i18n="btnClear">Clear</button>
      </div>
      <div class="log-pane" id="logBody">
        <div class="log-empty">
          <div class="log-empty-icon">◈</div>
          <div data-i18n-html="logEmptyDesc">Run the agent to<br>see logs here</div>
        </div>
      </div>
    </div>

  </div>

  <!-- splitter 핸들 (시나리오 탭일 때만 유효) -->
  <div class="split-handle" id="splitHandle">
    <div class="split-handle-grip"></div>
  </div>

  <!-- 하단 실행 도크 -->
  <div class="run-dock" id="runDock">
    <div class="run-selected" id="runSelected">
      <span class="run-selected-empty" data-i18n="noScenario">No scenario selected</span>
    </div>
    <textarea class="run-textarea" id="scenarioInput" rows="4"
      data-i18n-placeholder="scenarioPlaceholder"
      placeholder="Select a scenario or type one (Ctrl+Enter to run)"></textarea>
    <button class="run-btn" id="runBtn" data-i18n="btnAgentRun">▶ Run Agent</button>
    <button class="stop-btn" id="stopBtn" data-i18n="btnStop" hidden>■ 중지</button>
  </div>

</div>

<script src="i18n.js"></script>
<script src="providers.js"></script>
<script src="sidepanel.js"></script>
</body>
</html>
