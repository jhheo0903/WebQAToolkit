<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Network Error Live Monitor</title>
    <style>
      :root {
        --bg-a: #f8fafc;
        --bg-b: #f8fafc;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #64748b;
        --line: #d1d5db;
        --line-strong: #94a3b8;
        --warning-bg: #fffbeb;
        --warning-line: #f59e0b;
        --warning-text: #92400e;
        --error-bg: #fef2f2;
        --error-line: #ef4444;
        --error-text: #991b1b;
        --accent: #2563eb;
        --accent-strong: #1d4ed8;
        --shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
      }

      :root[data-theme="dark"] {
        --bg-a: #0d0f14;
        --bg-b: #0d0f14;
        --panel: #13161e;
        --text: #dde3f0;
        --muted: #8891a8;
        --line: #252a38;
        --line-strong: #2e3448;
        --warning-bg: rgba(251, 191, 36, 0.08);
        --warning-line: #fbbf24;
        --warning-text: #fbbf24;
        --error-bg: rgba(244, 63, 94, 0.08);
        --error-line: #f43f5e;
        --error-text: #f43f5e;
        --accent: #6366f1;
        --accent-strong: #818cf8;
        --shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-width: 360px;
        overflow: hidden;
        background: var(--bg-a);
        color: var(--text);
        font-family: "Segoe UI Variable", "Trebuchet MS", "Segoe UI", sans-serif;
      }

      .app {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      .toolbar {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        padding: 12px 12px 10px;
        border-bottom: 1px solid var(--line);
        flex-shrink: 0;
      }

      button {
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        padding: 7px 11px;
        font-size: 12px;
        line-height: 1;
        color: var(--text);
        cursor: pointer;
        background: var(--panel);
        transition: all 0.18s ease;
      }

      button:hover {
        background: #ffffff;
        transform: translateY(-1px);
        box-shadow: 0 5px 12px rgba(15, 23, 42, 0.08);
      }

      :root[data-theme="dark"] button {
        background: #1f2937;
        color: var(--text);
      }

      :root[data-theme="dark"] button:hover {
        background: #273449;
        box-shadow: 0 5px 12px rgba(2, 6, 23, 0.45);
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 10px 12px;
        overscroll-behavior: contain;
      }

      .list::-webkit-scrollbar {
        width: 9px;
      }

      .list::-webkit-scrollbar-thumb {
        background: #94a3b8;
        border-radius: 999px;
      }

      .list::-webkit-scrollbar-track {
        background: transparent;
      }

      .promptDock {
        border-top: 1px solid var(--line);
        background: var(--panel);
        padding: 10px 12px 12px;
        display: grid;
        gap: 6px;
        flex-shrink: 0;
      }

      .composerHint {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.01em;
      }

      .composer {
        border: 1px solid var(--line-strong);
        border-radius: 14px;
        display: flex;
        align-items: flex-end;
        gap: 8px;
        padding: 8px 8px 8px 10px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      :root[data-theme="dark"] .composer {
        background: #1a1e28;
        border-color: var(--line-strong);
      }

      .promptInput {
        flex: 1;
        min-width: 0;
        border: none;
        border-radius: 8px;
        padding: 2px;
        font-size: 13px;
        outline: none;
        resize: none;
        line-height: 1.5;
        min-height: 96px;
        max-height: 220px;
        font-family: "Segoe UI Variable", "Trebuchet MS", "Segoe UI", sans-serif;
        background: transparent;
        color: var(--text);
      }

      :root[data-theme="dark"] .promptInput {
        color: var(--text);
      }

      :root[data-theme="dark"] .promptInput::placeholder {
        color: #94a3b8;
      }

      .promptButton {
        border: none;
        border-radius: 10px;
        width: 30px;
        min-width: 30px;
        height: 30px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--accent);
        font-size: 16px;
        font-weight: 900;
        line-height: 1;
        color: #ffffff;
        cursor: pointer;
      }

      .promptButton:hover {
        background: var(--accent-strong);
      }

      .promptButton:disabled {
        color: #cbd5e1;
        cursor: not-allowed;
        background: #64748b;
      }

      .item {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #ffffff;
        overflow: hidden;
        flex: 0 0 auto;
        box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05);
        animation: card-in 0.18s ease;
      }

      :root[data-theme="dark"] .item {
        background: #1a1e28;
        border-color: var(--line);
      }

      .item.warning {
        background: var(--warning-bg);
        border-color: var(--warning-line);
      }

      .item.error {
        background: var(--error-bg);
        border-color: var(--error-line);
      }

      .summary {
        width: 100%;
        border: 0;
        background: transparent;
        text-align: left;
        display: block;
        padding: 11px;
        cursor: pointer;
        line-height: 1.35;
      }

      .summary:hover {
        background: rgba(255, 255, 255, 0.5);
      }

      :root[data-theme="dark"] .summary:hover {
        background: #222736;
      }

      .row {
        display: flex;
        justify-content: space-between;
        gap: 6px;
        align-items: center;
        margin-bottom: 4px;
      }

      .leftMeta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .chevron {
        color: var(--muted);
        font-size: 13px;
      }

      .badge {
        font-size: 11px;
        font-weight: 700;
        border-radius: 999px;
        padding: 2px 6px;
        border: 1px solid var(--line-strong);
        background: #ffffff;
      }

      :root[data-theme="dark"] .badge {
        background: #13161e;
      }

      .item.warning .badge {
        color: var(--warning-text);
        border-color: var(--warning-line);
      }

      .item.error .badge {
        color: var(--error-text);
        border-color: var(--error-line);
      }

      .method {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .url {
        font-size: 12px;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .meta {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
      }

      .body {
        display: none;
        border-top: 1px dashed var(--line-strong);
        padding: 10px 11px;
        background: #ffffff;
      }

      :root[data-theme="dark"] .body {
        background: #13161e;
      }

      .body.open {
        display: block;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        font-family: "Consolas", "Courier New", monospace;
      }

      .empty {
        border: 1px dashed var(--line-strong);
        border-radius: 12px;
        padding: 20px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
        background: #ffffff;
      }

      :root[data-theme="dark"] .empty {
        background: #13161e;
      }

      .filterInfo {
        font-size: 11px;
        color: var(--muted);
        padding: 0 12px 8px;
        border-bottom: 1px solid var(--line);
        flex-shrink: 0;
      }

      @keyframes card-in {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div id="toolbar" class="toolbar">
        <button id="themeToggleButton" type="button" aria-label="Toggle dark mode">Dark</button>
        <button id="refreshButton" type="button">Refresh</button>
        <button id="clearButton" type="button">Clear All</button>
      </div>
      <div id="filterInfo" class="filterInfo">Current tab logs</div>
      <div id="list" class="list"></div>
      <div id="promptDock" class="promptDock">
        <div class="composerHint">Type to filter logs. Enter to apply, Shift+Enter for newline.</div>
        <div class="composer">
          <textarea
            id="promptInput"
            class="promptInput"
            rows="4"
            placeholder="Filter by URL, method, status, response body"
          ></textarea>
          <button id="promptSendButton" class="promptButton" type="button" aria-label="Apply filter">↑</button>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
