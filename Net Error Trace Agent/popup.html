<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Network Error Live Monitor</title>
    <style>
      :root {
        --bg-a: #f8fafc;
        --bg-b: #f8fafc;
        --panel: #ffffff;
        --surface2: #eef2f7;
        --text: #1f2937;
        --muted: #64748b;
        --text3: #4e566a;
        --line: #d1d5db;
        --line-strong: #94a3b8;
        --warning-bg: #fffbeb;
        --warning-line: #f59e0b;
        --warning-text: #92400e;
        --error-bg: #fef2f2;
        --error-line: #ef4444;
        --error-text: #991b1b;
        --accent: #6366f1;
        --accent-strong: #818cf8;
        --shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      }

      :root[data-theme="dark"] {
        --bg-a: #0d0f14;
        --bg-b: #0d0f14;
        --panel: #13161e;
        --surface2: #1a1e28;
        --text: #dde3f0;
        --muted: #8891a8;
        --text3: #4e566a;
        --line: #252a38;
        --line-strong: #2e3448;
        --warning-bg: rgba(251, 191, 36, 0.08);
        --warning-line: #fbbf24;
        --warning-text: #fbbf24;
        --error-bg: rgba(244, 63, 94, 0.08);
        --error-line: #f43f5e;
        --error-text: #f43f5e;
        --accent: #6366f1;
        --accent-strong: #818cf8;
        --shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-width: 360px;
        overflow: hidden;
        background: var(--bg-a);
        color: var(--text);
        font-family: "Segoe UI Variable", "Trebuchet MS", "Segoe UI", sans-serif;
      }

      .app {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      .toolbar {
        display: flex;
        position: relative;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        height: 44px;
        border-bottom: 1px solid var(--line);
        flex-shrink: 0;
        background: var(--panel);
      }

      .logo-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent-strong);
        flex-shrink: 0;
      }

      .header-site {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 11px;
        color: var(--text3);
        font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      .header-status {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 10px;
        color: var(--text3);
        font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        flex-shrink: 0;
        margin-left: auto;
      }

      .status-indicator {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--line-strong);
      }

      .actionBar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        flex-shrink: 0;
      }

      .actionBarSpacer {
        flex: 1;
      }

      .actionLabel {
        font-size: 10px;
        color: var(--muted);
        font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      .actionBtn {
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 11px;
        font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      .actionBtnPrimary {
        border-color: rgba(99, 102, 241, 0.25);
        color: var(--accent-strong);
        background: rgba(99, 102, 241, 0.08);
      }

      .toolbarTitle {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .toolbarTitleMain {
        font-size: 12px;
        font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-weight: 600;
        color: var(--accent-strong);
        letter-spacing: -0.02em;
      }

      .toolbarTitleSub {
        font-size: 10px;
        color: var(--muted);
        font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      .toolbarActions {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .toolbarHint {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 11px;
        color: #4e566a;
        font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      button {
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        padding: 7px 11px;
        font-size: 12px;
        line-height: 1;
        color: var(--text);
        cursor: pointer;
        background: var(--panel);
        transition: all 0.18s ease;
      }

      button:hover {
        background: #ffffff;
        transform: translateY(-1px);
        box-shadow: 0 5px 12px rgba(15, 23, 42, 0.08);
      }

      :root[data-theme="dark"] button {
        background: #1f2937;
        color: var(--text);
      }

      :root[data-theme="dark"] button:hover {
        background: #273449;
        box-shadow: 0 5px 12px rgba(2, 6, 23, 0.45);
      }

      .iconButton {
        width: 33px;
        min-width: 33px;
        height: 33px;
        padding: 0;
        font-size: 15px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .iconButton.active {
        border-color: var(--accent);
        color: var(--accent-strong);
      }

      .settingsOverlay {
        display: none;
        position: absolute;
        top: 44px;
        left: 0;
        right: 0;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        padding: 10px 12px 12px;
        gap: 9px;
        z-index: 100;
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .settingsOverlay.open {
        display: grid;
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .settings-inner {
        padding: 14px;
      }

      .settingsTitle {
        font-size: 10px;
        font-weight: 600;
        color: #4e566a;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      .settingsHead {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .settingsClose {
        border-radius: 8px;
        padding: 5px 8px;
        font-size: 11px;
      }

      .providerTabs,
      .provider-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .providerTab,
      .provider-tab {
        background: var(--surface2);
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        padding: 4px 10px;
        font-size: 11px;
        font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-weight: 500;
        color: var(--muted);
      }

      .providerTab.active,
      .provider-tab.active {
        border-color: rgba(99, 102, 241, 0.25);
        color: var(--accent-strong);
        background: rgba(99, 102, 241, 0.08);
      }

      .providerTab:hover,
      .provider-tab:hover {
        border-color: var(--accent-strong);
      }

      .fieldRow,
      .field-row {
        display: grid;
        grid-template-columns: 82px 1fr;
        align-items: center;
        margin: 5px 0 5px 0;
      }

      .fieldLabel,
      .field-label {
        font-size: 11px;
        color: var(--muted);
      }

      .fieldInput,
      .fieldSelect,
      .field-input,
      .field-select {
        border: 1px solid var(--line-strong);
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 11px;
        color: var(--text);
        background: var(--surface2);
        outline: none;
        font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      :root[data-theme="dark"] .fieldInput,
      :root[data-theme="dark"] .fieldSelect,
      :root[data-theme="dark"] .field-input,
      :root[data-theme="dark"] .field-select {
        background: #1a1e28;
      }

      .settingsFooter {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .ghAuthWrap {
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        padding: 8px;
        display: grid;
        margin: 5px 0 5px 0;
      }

      .ghStatus {
        font-size: 11px;
        color: var(--muted);
      }

      .ghStatus.error {
        color: #dc2626;
      }

      .ghStatus.ok {
        color: #16a34a;
        font-weight: 700;
      }

      .ghCode {
        font-size: 19px;
        letter-spacing: 0.13em;
        font-weight: 700;
        color: var(--accent-strong);
      }

      .ghActionsRow {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .ghButton {
        border-radius: 4px;
        padding: 6px 9px;
        font-size: 11px;
        font-weight: 700;
        background: var(--accent);
        color: #ffffff;
        border: 1px solid var(--accent-strong);
      }

      .ghButton:hover {
        background: var(--accent-strong);
        color: #ffffff;
        border-color: var(--accent-strong);
      }

      .ghButton.ghost {
        background: var(--panel);
        color: var(--text);
        border-color: var(--line-strong);
      }

      .ghButton.ghost:hover {
        background: var(--surface2);
        color: var(--text);
        border-color: var(--line-strong);
      }

      .ghAuthWrap .ghButton[data-gh-action="login"] {
        margin-top: 8px;
      }

      .ghHelp {
        font-size: 11px;
        color: var(--muted);
      }

      .saveStatus {
        margin-right: auto;
        font-size: 10px;
        color: var(--muted);
        font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      .saveStatus.ok {
        color: #16a34a;
      }

      .saveStatus.err {
        color: #dc2626;
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 10px 12px;
        overscroll-behavior: contain;
      }

      .list::-webkit-scrollbar {
        width: 9px;
      }

      .list::-webkit-scrollbar-thumb {
        background: #94a3b8;
        border-radius: 999px;
      }

      .list::-webkit-scrollbar-track {
        background: transparent;
      }

      .promptDock {
        border-top: 1px solid var(--line);
        background: var(--panel);
        padding: 10px 12px 12px;
        display: grid;
        gap: 6px;
        flex-shrink: 0;
      }

      .composerHint {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.01em;
      }

      .composer {
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        display: flex;
        align-items: flex-end;
        gap: 8px;
        padding: 8px 8px 8px 10px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      :root[data-theme="dark"] .composer {
        background: #1a1e28;
        border-color: var(--line-strong);
      }

      .promptInput {
        flex: 1;
        min-width: 0;
        border: none;
        border-radius: 8px;
        padding: 2px;
        font-size: 13px;
        outline: none;
        resize: none;
        line-height: 1.5;
        min-height: 96px;
        max-height: 220px;
        font-family: "Segoe UI Variable", "Trebuchet MS", "Segoe UI", sans-serif;
        background: transparent;
        color: var(--text);
      }

      :root[data-theme="dark"] .promptInput {
        color: var(--text);
      }

      :root[data-theme="dark"] .promptInput::placeholder {
        color: #94a3b8;
      }

      .promptButton {
        border: none;
        border-radius: 6px;
        width: 30px;
        min-width: 30px;
        height: 30px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--accent);
        font-size: 16px;
        font-weight: 900;
        line-height: 1;
        color: #ffffff;
        cursor: pointer;
      }

      .promptButton:hover {
        background: var(--accent-strong);
      }

      .promptButton:disabled {
        color: #cbd5e1;
        cursor: not-allowed;
        background: #64748b;
      }

      .item {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #ffffff;
        overflow: hidden;
        flex: 0 0 auto;
        box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05);
        animation: card-in 0.18s ease;
      }

      :root[data-theme="dark"] .item {
        background: #1a1e28;
        border-color: var(--line);
      }

      .item.warning {
        background: var(--warning-bg);
        border-color: var(--warning-line);
      }

      .item.error {
        background: var(--error-bg);
        border-color: var(--error-line);
      }

      .summary {
        width: 100%;
        border: 0;
        background: transparent;
        text-align: left;
        display: block;
        padding: 11px;
        cursor: pointer;
        line-height: 1.35;
      }

      .summary:hover {
        background: rgba(255, 255, 255, 0.5);
      }

      :root[data-theme="dark"] .summary:hover {
        background: #222736;
      }

      .row {
        display: flex;
        justify-content: space-between;
        gap: 6px;
        align-items: center;
        margin-bottom: 4px;
      }

      .leftMeta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .chevron {
        color: var(--muted);
        font-size: 13px;
      }

      .badge {
        font-size: 11px;
        font-weight: 700;
        border-radius: 999px;
        padding: 2px 6px;
        border: 1px solid var(--line-strong);
        background: #ffffff;
      }

      :root[data-theme="dark"] .badge {
        background: #13161e;
      }

      .item.warning .badge {
        color: var(--warning-text);
        border-color: var(--warning-line);
      }

      .item.error .badge {
        color: var(--error-text);
        border-color: var(--error-line);
      }

      .method {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .url {
        font-size: 12px;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .meta {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
      }

      .body {
        display: none;
        border-top: 1px dashed var(--line-strong);
        padding: 10px 11px;
        background: #ffffff;
      }

      :root[data-theme="dark"] .body {
        background: #13161e;
      }

      .body.open {
        display: block;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        font-family: "Consolas", "Courier New", monospace;
      }

      .empty {
        border: 1px dashed var(--line-strong);
        border-radius: 12px;
        padding: 20px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
        background: #ffffff;
      }

      :root[data-theme="dark"] .empty {
        background: #13161e;
      }

      .filterInfo {
        font-size: 11px;
        color: var(--muted);
        padding: 0 12px 8px;
        margin-top: 8px;
        border-bottom: 1px solid var(--line);
        flex-shrink: 0;
      }

      .aiInfo {
        display: none;
        margin: 8px 12px 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #ffffff;
        padding: 9px 10px;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .aiInfo.show {
        display: block;
      }

      :root[data-theme="dark"] .aiInfo {
        background: #1a1e28;
      }

      @keyframes card-in {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div id="toolbar" class="toolbar header">
        <div class="toolbarTitle logo">
          <span class="toolbarTitleMain">Net Error Agent</span>
        </div>
        <div class="header-status">
          <span class="status-indicator"></span>
          <span id="statusText">ready</span>
        </div>
        <button id="settingsButton" class="iconButton btn-settings" type="button" aria-label="AI settings">⚙</button>
      </div>
      <div class="actionBar">
        <span class="actionLabel">Panel Controls</span>
        <span class="actionBarSpacer"></span>
        <button id="themeToggleButton" class="actionBtn" type="button" aria-label="Toggle dark mode">Dark</button>
        <button id="refreshButton" class="actionBtn" type="button">Refresh</button>
        <button id="clearButton" class="actionBtn" type="button">Clear All</button>
      </div>
      <section id="settingsOverlay" class="settingsOverlay settings-overlay" aria-label="AI settings panel">
        <div class="settings-inner">
          <div class="settingsTitle settings-title">AI Settings</div>
          <div id="providerTabs" class="providerTabs provider-tabs"></div>
          <div id="providerFields" class="providerFields fields"></div>
          <div class="settingsFooter settings-footer">
            <span id="saveStatus" class="saveStatus save-status"></span>
            <button id="saveSettingsButton" class="actionBtn actionBtnPrimary" type="button">Save</button>
          </div>
        </div>
      </section>
      <div id="filterInfo" class="filterInfo">Current tab logs</div>
      <div id="aiInfo" class="aiInfo"></div>
      <div id="list" class="list"></div>
      <div id="promptDock" class="promptDock">
        <div class="composerHint">Prompt to AI for log analysis/filtering. Enter to run, Shift+Enter for newline.</div>
        <div class="composer">
          <textarea
            id="promptInput"
            class="promptInput"
            rows="4"
            placeholder="e.g. Find likely root cause of repeated 500 errors on payment API"
          ></textarea>
          <button id="promptSendButton" class="promptButton" type="button" aria-label="Run AI prompt">↑</button>
        </div>
      </div>
    </div>
    <script src="providers.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
